<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>融合定位系统（进阶版）</title>

<script src="https://webapi.amap.com/maps?v=2.0&key=你的JS_KEY"></script>

<style>
body {background:#0b1120;color:#e2e8f0;font-family:sans-serif;padding:20px;}
#map{height:320px;margin-top:10px;border-radius:10px;}
.log{font-size:12px;height:120px;overflow:auto;color:#94a3b8;}
.good{color:#34d399;}
.bad{color:#f87171;}
</style>
</head>

<body>

<h2>融合定位系统（卡尔曼滤波）</h2>
<div id="status">初始化中...</div>
<div id="info"></div>
<div id="map"></div>
<div class="log" id="log"></div>

<script>
const AMAP_KEY = '你的Web服务Key';

// =====================
// 🧠 卡尔曼滤波
// =====================
class KalmanFilter {
  constructor(R=0.00001, Q=3){
    this.R = R;
    this.Q = Q;
    this.A = 1;
    this.C = 1;
    this.cov = NaN;
    this.x = NaN;
  }
  filter(z){
    if(isNaN(this.x)){
      this.x = z;
      this.cov = 1;
    }else{
      const predX = this.A * this.x;
      const predCov = this.A * this.cov * this.A + this.R;

      const K = predCov * this.C / (this.C * predCov * this.C + this.Q);
      this.x = predX + K * (z - this.C * predX);
      this.cov = predCov - K * this.C * predCov;
    }
    return this.x;
  }
}

const kLat = new KalmanFilter();
const kLon = new KalmanFilter();

let bestAcc = Infinity;
let map, marker, polyline;
let path = [];
let watchId;

// =====================
function log(msg, good=false){
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${good?'good':'bad'}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// =====================
// 🚀 定位
// =====================
function start(){
  watchId = navigator.geolocation.watchPosition(onPos,onErr,{
    enableHighAccuracy:true,
    timeout:15000,
    maximumAge:0
  });

  setTimeout(stop,12000);
}

function stop(){
  navigator.geolocation.clearWatch(watchId);
  document.getElementById('status').innerText='定位完成';
}

// =====================
function onPos(pos){
  let {latitude,longitude,accuracy} = pos.coords;

  // 丢弃垃圾点
  if(accuracy > 800){
    log('丢弃差点');
    return;
  }

  // 卡尔曼滤波
  latitude = kLat.filter(latitude);
  longitude = kLon.filter(longitude);

  // 跳点检测（>300m直接丢）
  if(path.length){
    const last = path[path.length-1];
    const dist = getDistance(last.lat,last.lon,latitude,longitude);
    if(dist > 300){
      log('丢弃跳点');
      return;
    }
  }

  path.push({lat:latitude,lon:longitude});

  if(accuracy < bestAcc){
    bestAcc = accuracy;
    log(`✔精度提升 ${Math.round(accuracy)}m`,true);
  }

  render(latitude,longitude,accuracy);

  if(accuracy < 30){
    stop();
  }
}

// =====================
function getDistance(lat1,lon1,lat2,lon2){
  const R=6371e3;
  const φ1=lat1*Math.PI/180;
  const φ2=lat2*Math.PI/180;
  const Δφ=(lat2-lat1)*Math.PI/180;
  const Δλ=(lon2-lon1)*Math.PI/180;

  const a=Math.sin(Δφ/2)**2+
  Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// =====================
function onErr(e){
  log('定位失败');
}

// =====================
// 🗺️ 渲染
// =====================
function render(lat,lon,acc){
  document.getElementById('info').innerHTML=`
    纬度:${lat.toFixed(6)}<br>
    经度:${lon.toFixed(6)}<br>
    精度:${Math.round(acc)}m
  `;

  if(!map){
    map = new AMap.Map('map',{zoom:17,center:[lon,lat]});
  }

  if(!marker){
    marker = new AMap.Marker({position:[lon,lat],map});
  }else{
    marker.setPosition([lon,lat]);
    map.panTo([lon,lat]);
  }

  // 轨迹
  if(!polyline){
    polyline = new AMap.Polyline({
      path:[],
      strokeColor:"#22d3ee",
      strokeWeight:3
    });
    map.add(polyline);
  }

  polyline.setPath(path.map(p=>[p.lon,p.lat]));
}

// =====================
start();
</script>
</body>
</html>
