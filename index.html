<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高精度定位引擎</title>

<script src="https://webapi.amap.com/maps?v=2.0&key=4a37526179c8b959ee1b93a79ddc2e00"></script>

<style>
body { background:#0b1120;color:#e2e8f0;font-family:sans-serif;padding:20px;}
.box{max-width:900px;margin:auto;}
#map{height:320px;margin-top:15px;border-radius:10px;}
.log{font-size:12px;color:#94a3b8;margin-top:10px;height:120px;overflow:auto;}
.good{color:#34d399;}
.bad{color:#f87171;}
</style>
</head>

<body>
<div class="box">
<h2>高精度定位（收敛模式）</h2>
<div id="status">初始化中...</div>
<div id="info"></div>
<div id="map"></div>
<div class="log" id="log"></div>
</div>

<script>
const AMAP_KEY = '36a759d46f77237403291b98bed755f6';

let best = null;
let samples = [];
let watchId = null;
let map, marker;

function log(msg, good=false){
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${good?'good':'bad'}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// ======================
// 🚀 启动高精度定位
// ======================
function startLocate(){
  if(!navigator.geolocation){
    alert('浏览器不支持定位');
    return;
  }

  document.getElementById('status').innerText = '定位中（收敛中...）';

  watchId = navigator.geolocation.watchPosition(onSuccess, onError,{
    enableHighAccuracy:true,
    timeout:15000,
    maximumAge:0
  });

  // 10秒自动停止
  setTimeout(stopLocate,10000);
}

function stopLocate(){
  if(watchId){
    navigator.geolocation.clearWatch(watchId);
    log('定位结束（已收敛）',true);
    document.getElementById('status').innerText = '定位完成';
  }

  if(best){
    reverseGeocode(best.coords.latitude,best.coords.longitude);
  }
}

// ======================
// 📍 定位成功
// ======================
function onSuccess(pos){
  const acc = pos.coords.accuracy;
  log(`采样: 精度 ${Math.round(acc)}m`);

  // 丢弃垃圾点
  if(acc > 800){
    log('丢弃（精度太差）');
    return;
  }

  samples.push(pos);

  if(!best || acc < best.coords.accuracy){
    best = pos;
    log(`✔ 更新最优: ${Math.round(acc)}m`,true);
    render(best);
  }

  // 达到理想精度直接停止
  if(acc < 50){
    stopLocate();
  }
}

// ======================
function onError(err){
  log('定位失败: '+err.message);
}

// ======================
// 🧠 逆地理 + 缓存
// ======================
async function reverseGeocode(lat,lon){
  const key = `${lat.toFixed(5)}_${lon.toFixed(5)}`;
  const cache = localStorage.getItem(key);

  if(cache){
    applyAddress(JSON.parse(cache));
    return;
  }

  try{
    const url = `https://restapi.amap.com/v3/geocode/regeo?location=${lon},${lat}&key=${AMAP_KEY}&radius=3000&extensions=all`;
    const res = await fetch(url);
    const data = await res.json();

    if(data.status==='1'){
      localStorage.setItem(key,JSON.stringify(data));
      applyAddress(data);
    }
  }catch(e){
    log('逆地理失败');
  }
}

function applyAddress(data){
  const addr = data.regeocode.formatted_address;
  document.getElementById('info').innerHTML += `<div>地址：${addr}</div>`;
}

// ======================
// 🗺️ 地图
// ======================
function render(pos){
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;

  document.getElementById('info').innerHTML = `
    <div>纬度：${lat}</div>
    <div>经度：${lon}</div>
    <div>精度：${Math.round(pos.coords.accuracy)} 米</div>
  `;

  if(!map){
    map = new AMap.Map('map',{
      zoom:16,
      center:[lon,lat]
    });
  }

  if(!marker){
    marker = new AMap.Marker({
      position:[lon,lat],
      map:map
    });
  }else{
    marker.setPosition([lon,lat]);
    map.setCenter([lon,lat]);
  }
}

// ======================
startLocate();
</script>
</body>
</html>
