<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>访客分析</title>
<style>
  :root {
    --bg-0: #050915;
    --bg-1: #0b1120;
    --panel: rgba(10, 20, 40, 0.72);
    --panel-strong: rgba(10, 20, 40, 0.92);
    --line: rgba(148, 163, 184, 0.2);
    --line-strong: rgba(51, 65, 85, 0.9);
    --text-0: #e2e8f0;
    --text-1: #94a3b8;
    --accent: #22d3ee;
    --accent-2: #a78bfa;
    --ok: #34d399;
    --warn: #fbbf24;
    --danger: #f87171;
  }
  body {
    background:
      radial-gradient(circle at 15% 10%, rgba(56, 189, 248, 0.22), transparent 42%),
      radial-gradient(circle at 85% 0%, rgba(167, 139, 250, 0.22), transparent 35%),
      radial-gradient(circle at 50% 100%, rgba(45, 212, 191, 0.15), transparent 45%),
      var(--bg-1);
    color: var(--text-0);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 24px;
    box-sizing: border-box;
  }
  .box {
    width: 100%;
    max-width: 820px;
    background:
      linear-gradient(145deg, rgba(30, 41, 59, 0.15), rgba(15, 23, 42, 0.05)),
      var(--panel);
    border: 1px solid var(--line);
    backdrop-filter: blur(14px);
    border-radius: 22px;
    box-shadow:
      0 24px 56px rgba(2, 6, 23, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    padding: 26px;
  }
  .title {
    margin: 0 0 6px;
    font-size: 28px;
    letter-spacing: 0.3px;
    font-weight: 700;
  }
  #status {
    font-size: 18px;
    margin-bottom: 14px;
    min-height: 28px;
    font-weight: 600;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .action-btn {
    border: 1px solid rgba(34, 211, 238, 0.45);
    background: linear-gradient(135deg, rgba(14, 116, 144, 0.45), rgba(76, 29, 149, 0.3));
    color: #d7fbff;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: all .22s ease;
  }
  .action-btn:hover {
    transform: translateY(-1px) scale(1.01);
    background: linear-gradient(135deg, rgba(8, 145, 178, 0.56), rgba(109, 40, 217, 0.38));
    box-shadow: 0 8px 24px rgba(34, 211, 238, 0.2);
  }
  .action-btn:disabled {
    cursor: not-allowed;
    opacity: 0.6;
    transform: none;
  }
  .subtitle {
    margin: 0 0 20px;
    color: var(--text-1);
    font-size: 14px;
    line-height: 1.6;
  }
  #details {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px;
  }
  .section {
    background: var(--panel-strong);
    border: 1px solid var(--line-strong);
    border-radius: 14px;
    padding: 14px;
    text-align: left;
  }
  .section-title {
    margin: 0 0 10px;
    color: #dbeafe;
    font-size: 14px;
    letter-spacing: 0.2px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .item-list {
    display: grid;
    gap: 10px;
  }
  .item {
    padding: 12px;
    border-radius: 12px;
    background: linear-gradient(140deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.6));
    border: 1px solid rgba(71, 85, 105, 0.55);
  }
  .coord-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .coord-box {
    padding: 10px;
    border-radius: 10px;
    background: rgba(15, 23, 42, 0.72);
    border: 1px solid rgba(56, 189, 248, 0.28);
    min-height: 62px;
    display: grid;
    align-content: center;
    gap: 4px;
  }
  .coord-title {
    color: var(--text-1);
    font-size: 12px;
  }
  .coord-value {
    color: #67e8f9;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.2px;
    word-break: break-all;
  }
  .detail-address-wrap {
    grid-column: 1 / -1;
  }
  .detail-address-box {
    margin-top: 8px;
    padding: 12px 14px;
    border-radius: 12px;
    background: rgba(15, 23, 42, 0.85);
    border: 1px solid rgba(167, 139, 250, 0.35);
    color: #e0e7ff;
    font-size: 14px;
    line-height: 1.65;
    min-height: 48px;
    word-break: break-word;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }
  .label { color: var(--text-1); }
  .value { color: var(--accent); font-weight: 700; word-break: break-all; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 12px;
    line-height: 1.6;
  }
  .badge-high {
    color: #d1fae5;
    background: rgba(16, 185, 129, 0.2);
    border: 1px solid rgba(52, 211, 153, 0.6);
  }
  .badge-mid {
    color: #fef3c7;
    background: rgba(245, 158, 11, 0.16);
    border: 1px solid rgba(251, 191, 36, 0.6);
  }
  .badge-low {
    color: #fee2e2;
    background: rgba(239, 68, 68, 0.16);
    border: 1px solid rgba(248, 113, 113, 0.55);
  }
  .success { color: var(--ok); }
  .fail { color: var(--danger); }
  .warn { color: var(--warn); }
  .loading {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #cbd5e1;
  }
  .dots {
    display: inline-flex;
    gap: 4px;
  }
  .dots i {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: .35;
    animation: blink 1.1s infinite ease-in-out;
  }
  .dots i:nth-child(2) { animation-delay: .15s; }
  .dots i:nth-child(3) { animation-delay: .3s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: .25; transform: translateY(0); }
    40% { opacity: 1; transform: translateY(-2px); }
  }

  @media (max-width: 768px) {
    body {
      padding: 12px;
      align-items: flex-start;
    }
    .box {
      border-radius: 16px;
      padding: 16px;
      margin-top: env(safe-area-inset-top, 8px);
      margin-bottom: env(safe-area-inset-bottom, 8px);
    }
    .title {
      font-size: 22px;
    }
    .topbar {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }
    .action-btn {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
    }
    #status {
      font-size: 16px;
      min-height: 24px;
    }
    .subtitle {
      font-size: 13px;
      margin-bottom: 14px;
    }
    #details {
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .section { padding: 12px; }
    .section-title { margin-bottom: 8px; }
    .item-list { gap: 8px; }
    .item {
      padding: 10px;
      font-size: 13px;
    }
    .coord-grid {
      grid-template-columns: 1fr;
      gap: 8px;
    }
  }
</style>
</head>
<body>

<div class="box">
  <h1 class="title">访客分析面板</h1>
  <div class="topbar">
    <div id="status">正在采集数据...</div>
    <button id="relocateBtn" class="action-btn" type="button">重新定位</button>
  </div>
  <p class="subtitle">优先使用设备定位并做逆地理编码（地区/城市），失败时再回退到 IP 定位。</p>
  <div id="details"></div>
</div>

<script>
  const visitorData = {
    timestamp: new Date().toISOString(),
    ip: {},
    geo: {},
    device: {},
    fingerprint: '',
    geoSource: '',
    geoAccuracy: '',
    geoRaw: { lat: null, lon: null },
    geoResolveStatus: '',
    hasPreciseCoords: false,
    address_detail: '',
    geoConfidence: { level: 'low', text: '低（IP 粗略）', className: 'badge-low' }
  };
  const AMAP_LOCATION_KEY = '36a759d46f77237403291b98bed755f6';
  let isLocating = false;

  function setLoadingStatus(message = '正在采集数据') {
    const statusEl = document.getElementById('status');
    statusEl.innerHTML = `<span class="loading">${message}<span class="dots"><i></i><i></i><i></i></span></span>`;
  }

  function setStatusDone(message = '位置采集完成') {
    const statusEl = document.getElementById('status');
    statusEl.innerHTML = `<span class="success">${message}</span>`;
  }

  function setRelocateLoading(loading) {
    isLocating = loading;
    const btn = document.getElementById('relocateBtn');
    if (!btn) return;
    btn.disabled = loading;
    btn.textContent = loading ? '定位中...' : '重新定位';
  }

  function detectBrowser(ua) {
    if (/Edg\//.test(ua)) return 'Edge';
    if (/OPR\//.test(ua)) return 'Opera';
    if (/Firefox\//.test(ua)) return 'Firefox';
    if (/CriOS\//.test(ua)) return 'Chrome (iOS)';
    if (/FxiOS\//.test(ua)) return 'Firefox (iOS)';
    if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) return 'Chrome';
    if (/Safari\//.test(ua) && !/Chrome\//.test(ua)) return 'Safari';
    return '其他';
  }

  function detectOS(ua) {
    const platform = navigator.platform || '';
    const isTouchMac = platform === 'MacIntel' && navigator.maxTouchPoints > 1;

    if (/Android/i.test(ua)) return 'Android';
    if (/iPhone|iPod/i.test(ua)) return 'iOS';
    if (/iPad/i.test(ua) || isTouchMac) return 'iPadOS';
    if (/Windows NT/i.test(ua)) return 'Windows';
    if (/Mac OS X/i.test(ua)) return 'macOS';
    if (/Linux/i.test(ua)) return 'Linux';
    return '其他';
  }

  async function fetchJsonWithTimeout(url, timeoutMs = 2600, extraOptions = {}) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, { mode: 'cors', ...extraOptions, signal: controller.signal });
      if (!res.ok) return null;
      return await res.json();
    } catch (e) {
      return null;
    } finally {
      clearTimeout(timer);
    }
  }

  // 采集设备信息（提升系统识别准确率）
  function collectDeviceInfo() {
    const ua = navigator.userAgent;
    const os = detectOS(ua);
    const isMobile = /Mobile|Android|iPhone|iPod/i.test(ua) || os === 'iPadOS';

    visitorData.device = {
      browser: detectBrowser(ua),
      os: os,
      deviceType: isMobile ? '手机/平板' : '桌面端',
      screen: screen.width + ' × ' + screen.height,
      language: navigator.language,
      ua: ua,
      referrer: document.referrer || '直接访问',
      platform: navigator.platform || '未知'
    };
  }

  // 采集 IP 和位置（多源备选）
  async function fetchIPInfo() {
    const apis = [
      'https://ipapi.co/json/',
      'https://api.ip.sb/geoip',
      'https://ipwho.is/'
    ];

    for (const url of apis) {
      try {
        const data = await fetchJsonWithTimeout(url, 2600);
        if (!data) continue;

        // 统一不同 API 的字段格式
        if (data.ip || data.query || data.ip_address) {
          visitorData.ip = { address: data.ip || data.query || data.ip_address };
          visitorData.geo.country = data.country_name || data.country || '--';
          visitorData.geo.region = data.region || data.region_name || data.state || '--';
          visitorData.geo.city = data.city || '--';
          visitorData.geo.timezone = data.timezone || '--';
          visitorData.geo.isp = data.org || data.isp || data.asn || '--';

          // 避免并行流程中用 IP 坐标覆盖已获取的高精度 GPS 坐标
          if (!visitorData.hasPreciseCoords) {
            const ipLat = data.latitude ?? data.lat;
            const ipLon = data.longitude ?? data.lon;
            visitorData.geo.lat = ipLat != null ? String(ipLat) : '--';
            visitorData.geo.lon = ipLon != null ? String(ipLon) : '--';
          }
          visitorData.geoSource = 'IP 定位';
          visitorData.geoResolveStatus = 'IP 城市（粗略）';
          // IP 仅能到城市级，不作为“详细地址”展示和入库
          visitorData.address_detail = '';
          return; // 成功就退出
        }
      } catch (e) {
        console.log(url + ' 失败，尝试下一个...');
      }
    }

    // 全部失败时的兜底：尝试从 STUN 获取内网/公网 IP
    try {
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      pc.createDataChannel('');
      pc.createOffer().then(o => pc.setLocalDescription(o));
      pc.onicecandidate = (ice) => {
        if (!ice || !ice.candidate || !ice.candidate.candidate) return;
        const ipMatch = /([0-9]{1,3}\.){3}[0-9]{1,3}/.exec(ice.candidate.candidate);
        if (ipMatch) visitorData.ip.address = ipMatch[0];
        pc.close();
      };
      // 给 STUN 一点时间
      await new Promise(r => setTimeout(r, 1000));
    } catch (e) {
      console.log('STUN 获取失败');
    }
  }

  // 采集更精准经纬度（优先设备 GPS）
  async function fetchPreciseLocation(preferHighAccuracy = false) {
    if (!navigator.geolocation) return;

    let hasGrantedPermission = false;
    if (navigator.permissions && navigator.permissions.query) {
      try {
        const permissionState = await navigator.permissions.query({ name: 'geolocation' });
        hasGrantedPermission = permissionState.state === 'granted';
      } catch (e) {
        // 某些浏览器不支持 geolocation 权限查询，忽略并走默认策略
      }
    }

    const shouldUseHighAccuracy = preferHighAccuracy || hasGrantedPermission;

    try {
      const quickPosition = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: shouldUseHighAccuracy,
          timeout: shouldUseHighAccuracy ? 10000 : 4200,
          maximumAge: shouldUseHighAccuracy ? 0 : 120000
        });
      });

      const position = quickPosition;
      const { latitude, longitude, accuracy } = position.coords;
      visitorData.geoRaw.lat = latitude;
      visitorData.geoRaw.lon = longitude;
      // 保留完整精度展示，不做小数位截断
      visitorData.geo.lat = String(latitude);
      visitorData.geo.lon = String(longitude);
      visitorData.geoAccuracy = Math.round(accuracy) + ' 米';
      visitorData.geoSource = '设备 GPS';
      visitorData.hasPreciseCoords = true;
      visitorData.geoResolveStatus = 'GPS 坐标已获取';

      // 通过经纬度反查地区/城市，修复“授权后城市仍不准确”的问题
      const resolved = await reverseGeocode(latitude, longitude);
      if (!resolved) {
        // 关键修复：有 GPS 但反查失败时，不继续展示 IP 城市，避免“人在长沙显示北京”
        visitorData.geo.country = '--';
        visitorData.geo.region = '--';
        visitorData.geo.city = '--';
        visitorData.address_detail = '';
        visitorData.geoSource = '设备 GPS（城市反查失败）';
        visitorData.geoResolveStatus = 'GPS 成功，但城市反查失败';
      }
    } catch (error) {
      console.log('GPS 定位失败，保留 IP 定位结果');
      visitorData.hasPreciseCoords = false;
    }
  }

  // 经纬度逆地理编码（多源兜底）
  async function reverseGeocode(lat, lon) {
    const reverseApis = [
      `https://restapi.amap.com/v3/geocode/regeo?output=json&location=${encodeURIComponent(`${lon},${lat}`)}&key=${encodeURIComponent(AMAP_LOCATION_KEY)}&extensions=all&radius=1000&poitype=&batch=false&roadlevel=1`,
      `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}&zoom=20&addressdetails=1&namedetails=1&extratags=1&accept-language=zh-CN`,
      `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}&localityLanguage=zh`,
      `https://geocode.maps.co/reverse?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`
    ];

    for (const url of reverseApis) {
      try {
        const data = await fetchJsonWithTimeout(url, 5000, {
          headers: { 'Accept': 'application/json' }
        });
        if (!data) continue;
        const amapRegeo = data.regeocode || null;
        if (data.status === '0') continue;

        const rawAddr = amapRegeo?.addressComponent || data.address || {};
        const addr = {
          country: rawAddr.country,
          state: rawAddr.province || rawAddr.state,
          province: rawAddr.province,
          region: rawAddr.region,
          city: Array.isArray(rawAddr.city) ? (rawAddr.city[0] || '') : rawAddr.city,
          county: rawAddr.district || rawAddr.county,
          district: rawAddr.district,
          city_district: rawAddr.township || rawAddr.city_district,
          town: rawAddr.township || rawAddr.town,
          village: rawAddr.village,
          suburb: rawAddr.neighborhood?.name || rawAddr.suburb,
          road: rawAddr.streetNumber?.street || rawAddr.road,
          house_number: rawAddr.streetNumber?.number || rawAddr.house_number,
          postcode: rawAddr.adcode || rawAddr.postcode,
          neighbourhood: rawAddr.neighborhood?.name || rawAddr.neighbourhood,
          building: rawAddr.building?.name || rawAddr.building,
          amenity: amapRegeo?.pois?.[0]?.name || rawAddr.amenity
        };

        const country = localizeGeoText(addr.country || data.country || visitorData.geo.country || (amapRegeo ? '中国' : ''));
        const region = localizeGeoText(
          addr.state ||
          addr.province ||
          addr.region ||
          data.localityInfo?.administrative?.[1]?.name ||
          data.principalSubdivision ||
          data.state ||
          visitorData.geo.region
        );
        const city =
          localizeGeoText(
            addr.city ||
            addr.county ||
            rawAddr.citycode ||
            data.city ||
            data.locality ||
            data.localityInfo?.administrative?.[2]?.name ||
            visitorData.geo.city
          );

        if (country !== '--' || region !== '--' || city !== '--') {
          visitorData.geo.country = country || '--';
          visitorData.geo.region = region || '--';
          visitorData.geo.city = city || '--';
          visitorData.address_detail = buildAddressDetailFromReverse(data, addr, country, region, city);
          visitorData.geoSource = '设备 GPS + 逆地理编码';
          visitorData.geoResolveStatus = visitorData.address_detail ? 'GPS 街道级反查成功' : 'GPS 城市反查成功';
          return true;
        }
      } catch (e) {
        console.log('逆地理编码失败，尝试下一个服务');
      }
    }
    return false;
  }

  function buildAddressDetailFromReverse(data, addr, country, region, city) {
    const district = localizeGeoText(
      addr.city_district ||
      addr.district ||
      addr.county ||
      data.localityInfo?.administrative?.[3]?.name ||
      ''
    );
    const township = localizeGeoText(
      addr.town ||
      addr.village ||
      addr.suburb ||
      ''
    );
    const street = localizeGeoText(
      addr.road ||
      addr.street ||
      addr.residential ||
      addr.footway ||
      addr.cycleway ||
      addr.pedestrian ||
      addr.path ||
      addr.avenue ||
      data.street ||
      data.localityInfo?.informative?.[0]?.description ||
      ''
    );
    const streetNo = localizeGeoText(
      addr.house_number ||
      addr.house ||
      addr.building ||
      data.house_number ||
      ''
    );
    const poi = localizeGeoText(
      addr.neighbourhood ||
      addr.suburb ||
      addr.quarter ||
      addr.hamlet ||
      ''
    );
    const postcode = localizeGeoText(addr.postcode || data.postcode || '');

    const [orderedCity, orderedDistrict] = normalizeAdminOrder(city, district);

    const core = dedupeAddressParts([country, region, orderedCity, orderedDistrict]
      .map((x) => localizeGeoText(x))
      .filter((x) => x && x !== '--'));
    const roadPart = [street, streetNo].filter(Boolean).join('');
    const landmark = localizeGeoText(addr.amenity || addr.attraction || addr.building || '');
    const tail = dedupeAddressParts([township, roadPart, landmark, poi].filter(Boolean), core);
    const detailParts = dedupeAddressParts([...core, ...tail]);
    const detail = (country === '中国' || country === '中国大陆')
      ? formatChinaAddress(detailParts)
      : detailParts.join('');
    if (detail) {
      return postcode ? `${detail}（邮编：${postcode}）` : detail;
    }

    if (data.regeocode?.formatted_address && typeof data.regeocode.formatted_address === 'string') {
      return localizeGeoText(data.regeocode.formatted_address.trim());
    }
    if (data.display_name && typeof data.display_name === 'string') {
      return localizeGeoText(data.display_name.trim());
    }
    if (data.longAddress && typeof data.longAddress === 'string') {
      return localizeGeoText(data.longAddress.trim());
    }
    return core.join('') || '';
  }

  function normalizeAdminOrder(city, district) {
    const cityText = localizeGeoText(city || '');
    const districtText = localizeGeoText(district || '');
    if (!cityText || !districtText) return [cityText, districtText];

    const cityLooksTown = /(镇|鄉|乡|街道|村)$/.test(cityText);
    const districtLooksCity = /(市|区|縣|县)$/.test(districtText);
    if (cityLooksTown && districtLooksCity) {
      return [districtText, cityText];
    }
    return [cityText, districtText];
  }

  function dedupeAddressParts(parts, seed = []) {
    const result = [...seed];
    for (const raw of parts) {
      const part = collapseRepeatedAdminName(localizeGeoText(raw || '').trim());
      if (!part || part === '--') continue;
      const duplicated = result.some((existing) => {
        const e = String(existing).trim();
        if (!e) return false;
        // 去掉“市/区/县/镇”等后缀后相同，视为重复行政区
        if (normalizeAdminToken(e) === normalizeAdminToken(part)) return true;
        // 包含关系也视为重复，避免“浏阳市市”或同名片段重复拼接
        return e.includes(part) || part.includes(e);
      });
      if (!duplicated) result.push(part);
    }
    return seed.length ? result.slice(seed.length) : result;
  }

  function normalizeAdminToken(text) {
    return String(text)
      .replace(/\s+/g, '')
      .replace(/(省|市|区|县|镇|乡|街道|自治区|特别行政区)$/g, '');
  }

  function formatChinaAddress(parts) {
    const normalized = dedupeAddressParts((parts || []).map((p) => localizeGeoText(p)));
    if (!normalized.length) return '';

    const hasChina = normalized.some((p) => /^(中国|中华人民共和国|中国大陆)$/.test(p));
    const provinceOrMunicipality = normalized.find((p) =>
      /(省|自治区|特别行政区|市)$/.test(p)
    ) || '';
    const city = normalized.find((p) => /市$/.test(p) && p !== provinceOrMunicipality) || '';
    const district = normalized.find((p) => /(区|县)$/.test(p)) || '';
    const township = normalized.find((p) => /(镇|乡|街道)$/.test(p)) || '';
    const road = normalized.find((p) => /(路|街|道|巷|弄)$/.test(p) || /号$/.test(p)) || '';

    const adminOrdered = [provinceOrMunicipality, city, district, township, road].filter(Boolean);
    const picked = new Set(adminOrdered);

    // 明确移除国家词尾残留，国家只允许在最前或直接不显示
    const rest = normalized.filter((p) => !picked.has(p) && !/^(中国|中华人民共和国|中国大陆)$/.test(p));
    const ordered = dedupeAddressParts([...adminOrdered, ...rest]);
    return `${hasChina ? '中国' : ''}${ordered.join('')}`;
  }

  function collapseRepeatedAdminName(text) {
    const s = String(text || '').trim();
    if (!s) return s;
    // 处理“浏阳市浏阳市”这类整段重复
    const half = Math.floor(s.length / 2);
    if (s.length % 2 === 0 && s.slice(0, half) === s.slice(half)) {
      return s.slice(0, half);
    }
    // 处理行政后缀词连续重复（如：xx市xx市、xx区xx区）
    return s.replace(/((?:[\u4e00-\u9fff]{2,12})(?:市|区|县|镇|乡|街道))\1+/g, '$1');
  }

  function buildAddressDetailFromIP(geo) {
    const line = [geo.country, geo.region, geo.city].filter((x) => x && x !== '--').join(' ');
    return line ? line + '（IP 粗略）' : '';
  }

  function escHtml(s) {
    if (s == null || s === '') return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function toSimplifiedChinese(text) {
    if (!text || typeof text !== 'string') return text;
    const tradToSimpMap = {
      '臺': '台', '灣': '湾', '國': '国', '縣': '县', '區': '区', '鄉': '乡', '鎮': '镇',
      '裡': '里', '號': '号', '樓': '楼', '單': '单', '雙': '双', '門': '门', '島': '岛',
      '廣': '广', '東': '东', '龍': '龙', '蘇': '苏', '雲': '云', '陽': '阳', '陰': '阴',
      '車': '车', '醫': '医', '學': '学', '術': '术', '場': '场', '華': '华', '聯': '联',
      '務': '务', '層': '层', '與': '与', '處': '处', '達': '达', '觀': '观', '點': '点',
      '體': '体', '電': '电', '網': '网', '訊': '讯', '線': '线', '衛': '卫'
    };
    return String(text).replace(/[\u4e00-\u9fff]/g, (ch) => tradToSimpMap[ch] || ch);
  }

  function localizeGeoText(text) {
    if (!text || typeof text !== 'string') return text;
    const map = {
      China: '中国',
      'Hong Kong': '香港',
      Taiwan: '台湾',
      'Macao': '澳门',
      Beijing: '北京',
      Shanghai: '上海',
      Guangzhou: '广州',
      Shenzhen: '深圳'
    };
    const translated = toSimplifiedChinese(map[text] || text);
    return translated
      .replace(/People's Republic of China/gi, '中国')
      .replace(/\bGuangdong\b/gi, '广东')
      .replace(/\bBeijing\b/gi, '北京')
      .replace(/\bShanghai\b/gi, '上海')
      .replace(/\bShenzhen\b/gi, '深圳')
      .replace(/\bGuangzhou\b/gi, '广州');
  }

  function getGeoConfidence() {
    const accuracyText = visitorData.geoAccuracy || '';
    const accuracyMeters = Number(accuracyText.replace(/[^\d.]/g, '')) || 0;
    const isGps = visitorData.geoSource.includes('GPS');
    const hasReverse = visitorData.geoSource.includes('逆地理编码');

    if (isGps && hasReverse && accuracyMeters > 0 && accuracyMeters <= 80) {
      return { level: 'high', text: '高（街道级）', className: 'badge-high' };
    }
    if (isGps && (accuracyMeters <= 500 || hasReverse)) {
      return { level: 'mid', text: '中（城区级）', className: 'badge-mid' };
    }
    return { level: 'low', text: '低（IP 粗略）', className: 'badge-low' };
  }

  function updateGeoConfidence() {
    visitorData.geoConfidence = getGeoConfidence();
    return visitorData.geoConfidence;
  }

  // 生成指纹
  async function generateFingerprint() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillText(' fingerprint ', 2, 2);
    const canvasData = canvas.toDataURL();

    const str = [
      navigator.userAgent,
      navigator.language,
      screen.width + 'x' + screen.height,
      screen.colorDepth,
      navigator.hardwareConcurrency || '',
      canvasData
    ].join('|');

    const data = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest('SHA-256', data);
    visitorData.fingerprint = Array.from(new Uint8Array(hash))
      .map(b => b.toString(16).padStart(2, '0'))
      .join('')
      .substring(0, 16);
  }

  // 发送到 Netlify Function
  async function sendToServer() {
    const statusEl = document.getElementById('status');
    try {
      // 发送前刷新可信度，确保前端展示与 DB 入库一致
      updateGeoConfidence();
      const res = await fetch('/.netlify/functions/log-visitor', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(visitorData)
      });
      const result = await res.json();
      if (res.ok) {
        statusEl.innerHTML = '<span class="success">✅ 数据已成功存储</span>';
      } else {
        statusEl.innerHTML = '<span class="fail">❌ ' + (result.error || '服务器错误') + '</span>';
      }
    } catch (e) {
      statusEl.innerHTML = '<span class="warn">⚠️ 上报失败: ' + e.message + '</span>';
    }
    showDetails();
  }

  // 重新触发定位并上报
  async function relocalize() {
    if (isLocating) return;
    setRelocateLoading(true);
    setLoadingStatus('正在重新定位');
    try {
      visitorData.timestamp = new Date().toISOString();
      await Promise.allSettled([fetchIPInfo(), fetchPreciseLocation(false)]);
      await sendToServer();
      showDetails();
      setStatusDone('位置采集完成');
    } finally {
      setRelocateLoading(false);
    }
  }

  // 显示采集到的信息
  function showDetails() {
    const d = document.getElementById('details');
    const ip = visitorData.ip.address;
    updateGeoConfidence();
    const addressDetailHtml = visitorData.address_detail
      ? escHtml(visitorData.address_detail)
      : '<span class="warn">暂无（需 GPS 逆地理编码成功，或当前为 IP 粗略信息）</span>';

    d.innerHTML = `
      <div class="section">
        <h3 class="section-title">📍 定位概览</h3>
        <div class="item-list">
          <div class="item"><span class="label">位置：</span><span class="value">${visitorData.geo.country || '--'} ${visitorData.geo.region || '--'} ${visitorData.geo.city || '--'}</span></div>
          <div class="item detail-address-wrap">
            <span class="label">详细地址</span>
            <div class="detail-address-box">${addressDetailHtml}</div>
          </div>
          <div class="item">
            <span class="label">经纬度：</span>
            <div class="coord-grid">
              <div class="coord-box">
                <span class="coord-title">纬度 (Latitude)</span>
                <span class="coord-value">${visitorData.geo.lat || '--'}</span>
              </div>
              <div class="coord-box">
                <span class="coord-title">经度 (Longitude)</span>
                <span class="coord-value">${visitorData.geo.lon || '--'}</span>
              </div>
            </div>
          </div>
          <div class="item"><span class="label">定位来源：</span><span class="value">${visitorData.geoSource || '--'}</span></div>
          <div class="item"><span class="label">解析状态：</span><span class="value">${visitorData.geoResolveStatus || '--'}</span></div>
          <div class="item"><span class="label">定位精度：</span><span class="value">${visitorData.geoAccuracy || '--'}</span></div>
          <div class="item"><span class="label">可信度：</span><span class="badge ${visitorData.geoConfidence.className}">${visitorData.geoConfidence.text}</span></div>
        </div>
      </div>

      <div class="section">
        <h3 class="section-title">🧩 设备环境</h3>
        <div class="item-list">
          <div class="item"><span class="label">浏览器：</span><span class="value">${visitorData.device.browser || '--'}</span></div>
          <div class="item"><span class="label">系统：</span><span class="value">${visitorData.device.os || '--'}</span></div>
          <div class="item"><span class="label">设备：</span><span class="value">${visitorData.device.deviceType || '--'}</span></div>
          <div class="item"><span class="label">屏幕：</span><span class="value">${visitorData.device.screen || '--'}</span></div>
          <div class="item"><span class="label">语言：</span><span class="value">${visitorData.device.language || '--'}</span></div>
        </div>
      </div>

      <div class="section">
        <h3 class="section-title">🌐 访问数据</h3>
        <div class="item-list">
          <div class="item"><span class="label">IP：</span><span class="value">${ip || '<span class="warn">获取失败（可能被浏览器限制）</span>'}</span></div>
          <div class="item"><span class="label">运营商：</span><span class="value">${visitorData.geo.isp || '--'}</span></div>
          <div class="item"><span class="label">来源：</span><span class="value">${visitorData.device.referrer || '--'}</span></div>
          <div class="item"><span class="label">访客指纹：</span><span class="value">${visitorData.fingerprint || '--'}</span></div>
          <div class="item"><span class="label">采集时间：</span><span class="value">${new Date(visitorData.timestamp).toLocaleString('zh-CN')}</span></div>
        </div>
      </div>
    `;
  }

  // 启动
  async function init() {
    setLoadingStatus('正在初始化');
    setRelocateLoading(true);
    collectDeviceInfo();
    await generateFingerprint();
    await Promise.allSettled([fetchIPInfo(), fetchPreciseLocation(true)]);
    await sendToServer();
    showDetails();
    setStatusDone('位置采集完成');
    setRelocateLoading(false);
  }

  document.getElementById('relocateBtn').addEventListener('click', relocalize);
  init();
</script>
</body>
