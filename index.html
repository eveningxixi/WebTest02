<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高德地图 经纬度逆地理编码</title>
    <style>
        /* 简单页面样式 */
        body {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .input-box {
            margin: 15px 0;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            min-height: 100px;
            white-space: pre-line;
        }
    </style>
    <!-- 1. 引入高德地图JS API 2.0 → 替换这里的key为你自己的！！！ -->
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=4a37526179c8b959ee1b93a79ddc2e00"></script>
</head>
<body>
    <h2>高德地图 - 经纬度转详细地址</h2>

    <div class="input-box">
        <label>经度：</label>
        <input type="text" id="lng" value="116.481488" placeholder="请输入经度">
    </div>
    <div class="input-box">
        <label>纬度：</label>
        <input type="text" id="lat" value="39.990464" placeholder="请输入纬度">
    </div>

    <button onclick="getAddressByLngLat()">点击查询地址</button>

    <!-- 结果展示区域 -->
    <div id="result"></div>

    <script>
        // 核心：经纬度逆地理编码函数
        function getAddressByLngLat() {
            // 获取输入的经纬度
            const lng = document.getElementById('lng').value.trim();
            const lat = document.getElementById('lat').value.trim();
            const resultDom = document.getElementById('result');

            // 简单校验
            if (!lng || !lat) {
                resultDom.innerText = "请输入完整的经纬度！";
                return;
            }

            // 加载地理编码插件
            AMap.plugin('AMap.Geocoder', function () {
                const geocoder = new AMap.Geocoder({
                    city: '全国' // 设置为全国，精度更高
                });

                // 经纬度数组 [经度, 纬度]
                const lnglat = [parseFloat(lng), parseFloat(lat)];

                // 执行逆地理编码
                geocoder.getAddress(lnglat, function (status, result) {
                    if (status === 'complete' && result.info === 'OK') {
                        // 查询成功
                        const formattedAddress = result.regeocode.formattedAddress;
                        const addressComponent = result.regeocode.addressComponent;

                        // 拼接结果展示
                        let showText = "✅ 查询成功！\n";
                        showText += "【完整地址】：" + formattedAddress + "\n\n";
                        showText += "【结构化地址】：\n";
                        showText += "国家：" + addressComponent.country + "\n";
                        showText += "省份：" + addressComponent.province + "\n";
                        showText += "城市：" + (addressComponent.city || '无') + "\n";
                        showText += "区县：" + addressComponent.district + "\n";
                        showText += "街道：" + (addressComponent.township || '无');

                        resultDom.innerText = showText;
                    } else {
                        // 查询失败
                        resultDom.innerText = "❌ 查询失败，错误信息：" + result.info;
                    }
                });
            });
        }
    </script>
</body>
</html>
