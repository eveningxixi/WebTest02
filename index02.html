<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>访客高精度定位（坐标系修正版）</title>

<script src="https://webapi.amap.com/maps?v=2.0&key=4a37526179c8b959ee1b93a79ddc2e00"></script>

<style>
:root {
  --bg-0: #050915;
  --bg-1: #0b1120;
  --panel: rgba(10, 20, 40, 0.72);
  --panel-strong: rgba(10, 20, 40, 0.92);
  --line: rgba(148, 163, 184, 0.2);
  --line-strong: rgba(51, 65, 85, 0.9);
  --text-0: #e2e8f0;
  --text-1: #94a3b8;
  --accent: #22d3ee;
  --accent-2: #a78bfa;
  --ok: #34d399;
  --warn: #fbbf24;
  --danger: #f87171;
}

* { box-sizing: border-box; }

body {
  background:
    radial-gradient(circle at 15% 10%, rgba(56, 189, 248, 0.22), transparent 42%),
    radial-gradient(circle at 85% 0%, rgba(167, 139, 250, 0.22), transparent 35%),
    radial-gradient(circle at 50% 100%, rgba(45, 212, 191, 0.15), transparent 45%),
    var(--bg-1);
  color: var(--text-0);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 24px;
  box-sizing: border-box;
}

.box {
  width: 100%;
  max-width: 920px;
  background:
    linear-gradient(145deg, rgba(30, 41, 59, 0.15), rgba(15, 23, 42, 0.05)),
    var(--panel);
  border: 1px solid var(--line);
  backdrop-filter: blur(14px);
  border-radius: 22px;
  box-shadow:
    0 24px 56px rgba(2, 6, 23, 0.5),
    inset 0 1px 0 rgba(255, 255, 255, 0.06);
  padding: 26px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.title {
  margin: 0;
  font-size: 26px;
  letter-spacing: 0.3px;
  font-weight: 700;
}

#status {
  font-size: 15px;
  min-height: 24px;
  font-weight: 500;
  margin: 0;
}

.done { color: var(--ok); }

.subtitle {
  margin: 4px 0 18px;
  color: var(--text-1);
  font-size: 13px;
  line-height: 1.6;
}

/* ---- Buttons ---- */
.action-btn {
  border: 1px solid rgba(34, 211, 238, 0.45);
  background: linear-gradient(135deg, rgba(14, 116, 144, 0.45), rgba(76, 29, 149, 0.3));
  color: #d7fbff;
  border-radius: 12px;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.2px;
  cursor: pointer;
  transition: all .22s ease;
  white-space: nowrap;
}

.action-btn:hover {
  transform: translateY(-1px) scale(1.01);
  background: linear-gradient(135deg, rgba(8, 145, 178, 0.56), rgba(109, 40, 217, 0.38));
  box-shadow: 0 8px 24px rgba(34, 211, 238, 0.2);
}

.action-btn:disabled {
  cursor: not-allowed;
  opacity: 0.6;
  transform: none;
}

/* ---- Status spinner ---- */
.loading {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #cbd5e1;
}

.dots {
  display: inline-flex;
  gap: 4px;
}

.dots i {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  opacity: .35;
  animation: blink 1.1s infinite ease-in-out;
}

.dots i:nth-child(2) { animation-delay: .15s; }
.dots i:nth-child(3) { animation-delay: .3s; }

@keyframes blink {
  0%, 80%, 100% { opacity: .25; transform: translateY(0); }
  40% { opacity: 1; transform: translateY(-2px); }
}

.success { color: var(--ok); }
.fail { color: var(--danger); }
.warn { color: var(--warn); }

/* ---- Map ---- */
.map-wrap {
  margin-bottom: 18px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--line-strong);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
}

#map {
  height: 340px;
  width: 100%;
  display: block;
}

/* ---- Info grid ---- */
#info {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 12px;
}

.info-card {
  background: var(--panel-strong);
  border: 1px solid var(--line-strong);
  border-radius: 14px;
  padding: 14px;
  display: grid;
  gap: 8px;
}

.info-card.full {
  grid-column: 1 / -1;
}

.card-title {
  margin: 0;
  color: #dbeafe;
  font-size: 13px;
  letter-spacing: 0.2px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(71, 85, 105, 0.4);
}

.card-body {
  display: grid;
  gap: 8px;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 10px;
  border-radius: 10px;
  background: linear-gradient(140deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.6));
  border: 1px solid rgba(71, 85, 105, 0.55);
  gap: 8px;
}

.label {
  color: var(--text-1);
  font-size: 13px;
  flex-shrink: 0;
}

.value {
  color: var(--accent);
  font-weight: 600;
  font-size: 13px;
  word-break: break-all;
  text-align: right;
  font-family: 'SF Mono', 'Cascadia Code', monospace;
}

.value.gps { color: #4ade80; }
.value.low { color: #f87171; }
.value.medium { color: #fbbf24; }

.value.addr {
  font-family: inherit;
  max-width: 70%;
}

/* ---- Address detail box ---- */
.address-box {
  padding: 12px 14px;
  border-radius: 12px;
  background: rgba(15, 23, 42, 0.85);
  border: 1px solid rgba(167, 139, 250, 0.35);
  color: #e0e7ff;
  font-size: 14px;
  line-height: 1.65;
  min-height: 44px;
  word-break: break-word;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
}

/* ---- Coord grid ---- */
.coord-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.coord-box {
  padding: 10px;
  border-radius: 10px;
  background: rgba(15, 23, 42, 0.72);
  border: 1px solid rgba(56, 189, 248, 0.28);
  min-height: 56px;
  display: grid;
  align-content: center;
  gap: 4px;
}

.coord-title {
  color: var(--text-1);
  font-size: 11px;
}

.coord-value {
  color: #67e8f9;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.2px;
  word-break: break-all;
}

/* ---- Badge ---- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 12px;
  line-height: 1.6;
}

/* ---- Responsive ---- */
@media (max-width: 768px) {
  body {
    padding: 12px;
    align-items: flex-start;
  }

  .box {
    border-radius: 16px;
    padding: 16px;
    margin-top: env(safe-area-inset-top, 8px);
    margin-bottom: env(safe-area-inset-bottom, 8px);
  }

  .title {
    font-size: 20px;
  }

  .topbar {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }

  .action-btn {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
  }

  #status {
    font-size: 14px;
  }

  .subtitle {
    font-size: 12px;
    margin-bottom: 12px;
  }

  #info {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  #map {
    height: 240px;
  }

  .info-card { padding: 12px; }
  .item { padding: 8px; font-size: 12px; }
  .coord-grid { grid-template-columns: 1fr; gap: 6px; }
  .value { font-size: 12px; }
  .value.addr { max-width: 60%; }
}
</style>
</head>

<body>
<div class="box">
  <div class="topbar">
    <h1 class="title">🎯 高精度定位</h1>
    <div>
      <button id="relocateBtn" class="action-btn" type="button">重新定位</button>
    </div>
  </div>
  <p class="subtitle">坐标系修正（WGS-84 → GCJ-02）· 精度半径 3000m · 高德逆地理编码</p>

  <div class="map-wrap">
    <div id="map"></div>
  </div>

  <div id="status"><span class="loading">正在请求 GPS 高精度定位<span class="dots"><i></i><i></i><i></i></span></span></div>
  <div id="info"></div>
</div>

<script>
const AMAP_KEY = '36a759d46f77237403291b98bed755f6';

let visitor = {
  lat: null,      // GCJ-02（用于显示和地图）
  lon: null,      // GCJ-02
  rawLat: null,   // WGS-84（原始）
  rawLon: null,   // WGS-84
  accuracy: '',
  address: '',
  source: '',
  confidence: '',
  bestAccuracy: Infinity
};

let watchId = null;
let timeoutId = null;
let hasResult = false;
let map = null;
let marker = null;
let circle = null;
let isLocating = false;

// =========================
// 🌍 WGS-84 → GCJ-02 坐标转换
// =========================
const PI = 3.14159265358979324;
const A = 6378245.0;
const EE = 0.00669342162296594323;

function outOfChina(lng, lat) {
  return (lng < 72.004 || lng > 137.8347) || (lat < 0.8293 || lat > 55.8271);
}

function transformLat(lng, lat) {
  let ret = -100.0 + 2.0 * lng + 3.0 * lat + 0.2 * lat * lat + 0.1 * lng * lat + 0.2 * Math.sqrt(Math.abs(lng));
  ret += (20.0 * Math.sin(6.0 * lng * PI) + 20.0 * Math.sin(2.0 * lng * PI)) * 2.0 / 3.0;
  ret += (20.0 * Math.sin(lat * PI) + 40.0 * Math.sin(lat / 3.0 * PI)) * 2.0 / 3.0;
  ret += (160.0 * Math.sin(lat / 12.0 * PI) + 320 * Math.sin(lat * PI / 30.0)) * 2.0 / 3.0;
  return ret;
}

function transformLng(lng, lat) {
  let ret = 300.0 + lng + 2.0 * lat + 0.1 * lng * lng + 0.1 * lng * lat + 0.1 * Math.sqrt(Math.abs(lng));
  ret += (20.0 * Math.sin(6.0 * lng * PI) + 20.0 * Math.sin(2.0 * lng * PI)) * 2.0 / 3.0;
  ret += (20.0 * Math.sin(lng * PI) + 40.0 * Math.sin(lng / 3.0 * PI)) * 2.0 / 3.0;
  ret += (150.0 * Math.sin(lng / 12.0 * PI) + 300.0 * Math.sin(lng / 30.0 * PI)) * 2.0 / 3.0;
  return ret;
}

function wgs84ToGcj02(lng, lat) {
  if (outOfChina(lng, lat)) return [lng, lat];
  
  let dLat = transformLat(lng - 105.0, lat - 35.0);
  let dLng = transformLng(lng - 105.0, lat - 35.0);
  const radLat = lat / 180.0 * PI;
  let magic = Math.sin(radLat);
  magic = 1 - EE * magic * magic;
  const sqrtMagic = Math.sqrt(magic);
  dLat = (dLat * 180.0) / ((A * (1 - EE)) / (magic * sqrtMagic) * PI);
  dLng = (dLng * 180.0) / (A / sqrtMagic * Math.cos(radLat) * PI);
  
  return [lng + dLng, lat + dLat];
}

// =========================
// UI Helper
// =========================
function setLoadingStatus(msg) {
  const el = document.getElementById('status');
  el.innerHTML = `<span class="loading">${msg}<span class="dots"><i></i><i></i><i></i></span></span>`;
}

function setStatusDone(msg) {
  const el = document.getElementById('status');
  el.innerHTML = `<span class="success">${msg}</span>`;
}

function setStatusWarn(msg) {
  const el = document.getElementById('status');
  el.innerHTML = `<span class="warn">${msg}</span>`;
}

function setRelocateLoading(loading) {
  isLocating = loading;
  const btn = document.getElementById('relocateBtn');
  if (!btn) return;
  btn.disabled = loading;
  btn.textContent = loading ? '定位中...' : '重新定位';
}

// =========================
// 🎯 高精度定位策略
// =========================
function locate() {
  if (!navigator.geolocation) {
    setStatusWarn('浏览器不支持定位');
    return;
  }

  // 15秒超时兜底
  timeoutId = setTimeout(() => {
    if (!hasResult) {
      stopWatch();
      setStatusWarn('GPS 信号弱，使用最佳可用位置');
      if (!visitor.lat) {
        navigator.geolocation.getCurrentPosition(
          pos => applyPosition(pos, false, true),
          err => setStatusWarn('定位失败: ' + err.message),
          { enableHighAccuracy: false, timeout: 5000, maximumAge: 60000 }
        );
      }
    }
  }, 15000);

  watchId = navigator.geolocation.watchPosition(
    pos => {
      const acc = pos.coords.accuracy;
      if (acc < visitor.bestAccuracy) visitor.bestAccuracy = acc;

      if (acc <= 100) {
        applyPosition(pos, true, true);
        stopWatch();
        clearTimeout(timeoutId);
      } else if (acc <= 500 && !hasResult) {
        applyPosition(pos, true, false);
        setLoadingStatus(`GPS 定位中... 当前精度 ${Math.round(acc)}米`);
      } else if (!hasResult && visitor.bestAccuracy > 500) {
        applyPosition(pos, true, false);
      }
    },
    err => {
      console.error('watchPosition error:', err);
      if (!hasResult) {
        navigator.geolocation.getCurrentPosition(
          pos => applyPosition(pos, false, true),
          err2 => {
            setStatusWarn('定位失败: ' + err2.message);
            clearTimeout(timeoutId);
          },
          { enableHighAccuracy: false, timeout: 5000, maximumAge: 60000 }
        );
      }
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}

function stopWatch() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
}

// =========================
// 📍 应用位置（关键：坐标转换）
// =========================
function applyPosition(pos, high, final) {
  const { latitude, longitude, accuracy } = pos.coords;

  // 保存原始 WGS-84
  visitor.rawLat = latitude;
  visitor.rawLon = longitude;
  
  // 转换为 GCJ-02（国内地图标准）
  const [gcjLng, gcjLat] = wgs84ToGcj02(longitude, latitude);
  visitor.lat = gcjLat;
  visitor.lon = gcjLng;
  
  visitor.accuracy = Math.round(accuracy) + '米';
  visitor.source = high ? 'GPS精确定位' : '网络/IP定位';

  if (final) {
    hasResult = true;
    setStatusDone(`定位完成 | 最终精度 ${Math.round(accuracy)}米`);
  }

  // 用 GCJ-02 坐标进行反查
  reverseGeocode(gcjLat, gcjLng, final);
}

// =========================
// 🗺️ 高德反查 + 缓存
// =========================
async function reverseGeocode(lon, lat, final) {
  const cacheKey = `geo_${lon.toFixed(5)}_${lat.toFixed(5)}`;
  const cache = localStorage.getItem(cacheKey);

  if (cache) {
    const data = JSON.parse(cache);
    applyAddress(data, final);
    return;
  }

  try {
    // 高德 API 接收 GCJ-02 坐标，格式：经度,纬度
    const url = `https://restapi.amap.com/v3/geocode/regeo?location=${lon},${lat}&key=${AMAP_KEY}&radius=3000&extensions=all`;
    
    const res = await fetch(url);
    const data = await res.json();

    if (data.status === '1' && data.regeocode) {
      localStorage.setItem(cacheKey, JSON.stringify(data));
      applyAddress(data, final);
      return;
    }
  } catch (e) {
    console.error('高德反查失败:', e);
  }

  fallbackReverse(lon, lat, final);
}

// =========================
// 🌍 fallback
// =========================
async function fallbackReverse(lon, lat, final) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
    const data = await res.json();
    visitor.address = data.display_name || '未知';
    calcConfidence();
    if (final) render();
  } catch {
    visitor.address = '地址解析失败';
    calcConfidence();
    if (final) render();
  }
}

// =========================
// 🧠 地址解析
// =========================
function applyAddress(data, final) {
  const regeo = data.regeocode;
  const comp = regeo.addressComponent;

  let address = regeo.formatted_address || '';
  const street = comp.streetNumber?.street || '';
  const number = comp.streetNumber?.number || '';

  if (street && number) {
    address = `${comp.province || ''}${comp.city || ''}${comp.district || ''}${street}${number}`;
  }

  const pois = regeo.pois || [];
  if (pois.length > 0 && !number) {
    const nearest = pois[0];
    address += `（附近：${nearest.name}，约${nearest.distance}米）`;
  }

  visitor.address = address || '未知位置';
  calcConfidence();
  if (final) render();
}

// =========================
// 🎯 精度评估
// =========================
function calcConfidence() {
  const acc = parseInt(visitor.accuracy) || 9999;
  if (acc < 20) visitor.confidence = '极高（米级/室内）';
  else if (acc < 50) visitor.confidence = '高（街道级）';
  else if (acc < 100) visitor.confidence = '中高（街区级）';
  else if (acc < 300) visitor.confidence = '中（城区级）';
  else if (acc < 1000) visitor.confidence = '低（粗略）';
  else visitor.confidence = '极低（仅城市级）';
}

// =========================
// 🗺️ 地图渲染（GCJ-02 坐标）
// =========================
function renderMap() {
  if (!visitor.lat) return;

  if (!map) {
    map = new AMap.Map('map', {
      zoom: 16,
      center: [visitor.lon, visitor.lat]
    });
  }

  if (!marker) {
    marker = new AMap.Marker({
      position: [visitor.lon, visitor.lat],
      map: map,
      title: '当前位置'
    });
  } else {
    marker.setPosition([visitor.lon, visitor.lat]);
  }

  const acc = parseInt(visitor.accuracy) || 0;
  const radius = Math.max(acc, 10);

  if (!circle) {
    circle = new AMap.Circle({
      center: [visitor.lon, visitor.lat],
      radius: radius,
      fillColor: '#22d3ee',
      fillOpacity: 0.15,
      strokeColor: '#22d3ee',
      strokeWeight: 2,
      strokeOpacity: 0.6,
      map: map
    });
  } else {
    circle.setCenter([visitor.lon, visitor.lat]);
    circle.setRadius(radius);
  }

  let zoom = 16;
  if (acc < 20) zoom = 18;
  else if (acc < 100) zoom = 17;
  else if (acc < 500) zoom = 15;
  else zoom = 13;

  map.setZoomAndCenter(zoom, [visitor.lon, visitor.lat]);
}

// =========================
// 🖥️ UI 渲染
// =========================
function render() {
  const acc = parseInt(visitor.accuracy) || 9999;
  const accClass = acc < 50 ? 'gps' : (acc < 300 ? 'medium' : 'low');
  const confClass = acc < 100 ? 'gps' : (acc < 500 ? 'medium' : 'low');

  const addressHtml = visitor.address
    ? `<div class="address-box">${visitor.address}</div>`
    : '<span class="warn">地址解析中...</span>';

  document.getElementById('info').innerHTML = `
    <div class="info-card full">
      <div class="card-title">📍 定位信息</div>
      <div class="card-body">
        <div class="item">
          <span class="label">维度</span>
          <span class="value">${visitor.lat?.toFixed(6) || '-'}</span>
        </div>
        <div class="item">
          <span class="label">经度</span>
          <span class="value">${visitor.lon?.toFixed(6) || '-'}</span>
        </div>
        <div class="item">
          <span class="label">精度半径</span>
          <span class="value ${accClass}">${visitor.accuracy}</span>
        </div>
        <div class="item">
          <span class="label">定位来源</span>
          <span class="value ${visitor.source.includes('GPS') ? 'gps' : 'medium'}">${visitor.source}</span>
        </div>
        <div class="item">
          <span class="label">可信度</span>
          <span class="value ${confClass}">${visitor.confidence}</span>
        </div>
        <div class="item">
          <span class="label">详细地址</span>
          ${addressHtml}
        </div>
      </div>
    </div>

    <div class="info-card">
      <div class="card-title">🌐 WGS-84 原始坐标</div>
      <div class="card-body">
        <div class="coord-grid">
          <div class="coord-box">
            <span class="coord-title">纬度 (Latitude)</span>
            <span class="coord-value">${visitor.rawLat?.toFixed(6) || '-'}</span>
          </div>
          <div class="coord-box">
            <span class="coord-title">经度 (Longitude)</span>
            <span class="coord-value">${visitor.rawLon?.toFixed(6) || '-'}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="info-card">
      <div class="card-title">🧩 GCJ-02 火星坐标</div>
      <div class="card-body">
        <div class="coord-grid">
          <div class="coord-box">
            <span class="coord-title">纬度 (Latitude)</span>
            <span class="coord-value">${visitor.lat?.toFixed(6) || '-'}</span>
          </div>
          <div class="coord-box">
            <span class="coord-title">经度 (Longitude)</span>
            <span class="coord-value">${visitor.lon?.toFixed(6) || '-'}</span>
          </div>
        </div>
      </div>
    </div>
  `;

  renderMap();
}

// =========================
// 🔄 重新定位
// =========================
async function relocalize() {
  if (isLocating) return;
  setRelocateLoading(true);

  // 重置数据
  visitor = {
    lat: null, lon: null, rawLat: null, rawLon: null,
    accuracy: '', address: '', source: '', confidence: '',
    bestAccuracy: Infinity
  };
  hasResult = false;

  if (timeoutId) clearTimeout(timeoutId);
  stopWatch();

  setLoadingStatus('正在重新定位');

  // 清空地图
  if (map) {
    map.destroy();
    map = null;
    marker = null;
    circle = null;
  }

  document.getElementById('info').innerHTML = '';

  setTimeout(() => {
    locate();
    setRelocateLoading(false);
  }, 500);
}

// =========================
// 🚀 启动
// =========================
document.getElementById('relocateBtn').addEventListener('click', relocalize);
locate();
</script>
